<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Grid Clock</title>
    <style>
        body {
            height: 100vh;
            width: 100vw;
            background-color: #163201;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .container {
            width: 600px; 
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            background-color: #a3ed96;
            padding: 20px;
            border-radius: 20px;
            justify-items: center; 
            align-items: center;
            box-shadow: 15px 15px 0px #0b1a01;
        }
        .time {
            font-size: 60px;
            font-weight: bold;
            color: #163201;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
      .time::after {
            font-size: 14px;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: normal;
        }
        .hrs::after { content: "Hours"; }
        .mins::after { content: "Mins"; }
        .secs::after { content: "Secs"; }
        .session::after { content: "Session"; }
    </style>
</head>
<body>

    <div class="container">
        <div id="hrs" class="time hrs">00</div>
        <div id="mins" class="time mins">00</div>
        <div id="secs" class="time secs">00</div>
        <div id="session" class="time session">AM</div>
    </div>

    <script>
        function updateclock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();
            let session = "AM";
            if (h >= 12) {
                session = "PM"; 
                if (h > 12) {
                    h = h - 12;
                }
            }
            if (h == 0) {
                h = 12;
            }
            if (h < 10) {h = "0" + h;}
            if (m < 10) {m = "0" + m;}
            if (s < 10) {s = "0" + s;}
            document.getElementById("hrs").innerHTML = h;
            document.getElementById("mins").innerHTML = m;
            document.getElementById("secs").innerHTML = s;
            document.getElementById("session").innerHTML = session;
        }

        updateclock();
        setInterval(updateclock, 1000);
    </script>
</body>
</html>
